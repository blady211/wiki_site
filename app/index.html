<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IT Knowledge Hub</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown.min.css">

<style>

body{
margin:0;
font-family:system-ui;
background:#020617;
color:#e5e7eb;
}

.topbar{
height:60px;
display:flex;
align-items:center;
padding:0 24px;
background:#020617;
border-bottom:1px solid #1e293b;
font-weight:600;
}

.layout{
display:flex;
height:calc(100vh - 60px);
}

/* sidebar */

.sidebar{
width:300px;
border-right:1px solid #1e293b;
display:flex;
flex-direction:column;
}

.sidebar-search{
padding:14px;
border-bottom:1px solid #1e293b;
}

#search{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #1e293b;
background:#020617;
color:white;
}

.tree{
overflow:auto;
flex:1;
padding:12px;
}

.tree-file{
display:block;
width:100%;
text-align:left;
background:none;
border:none;
padding:6px;
cursor:pointer;
color:#cbd5f5;
border-radius:6px;
}

.tree-file:hover{
background:rgba(56,189,248,.2);
}

/* content */

.content{
flex:1;
display:flex;
flex-direction:column;
overflow:hidden;
}

.breadcrumb{
padding:10px 20px;
font-size:13px;
color:#94a3b8;
border-bottom:1px solid #1e293b;
}

.doc{
flex:1;
overflow:auto;
padding:40px;
}

.markdown-body{
background:#020617;
padding:40px;
border-radius:12px;
max-width:900px;
margin:auto;
}

/* toc */

.toc{
width:220px;
border-left:1px solid #1e293b;
padding:20px;
overflow:auto;
}

.toc a{
display:block;
color:#94a3b8;
font-size:13px;
text-decoration:none;
padding:3px 0;
}

.toc a:hover{
color:#38bdf8;
}

/* search results */

.result{
padding:10px;
border-bottom:1px solid #1e293b;
cursor:pointer;
}

.result-title{
font-weight:600;
}

.result-snippet{
font-size:13px;
color:#94a3b8;
}

mark{
background:#0ea5e9;
color:white;
}

/* copy button */

.copy{
float:right;
font-size:11px;
background:#1e293b;
padding:3px 6px;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="topbar">
IT Knowledge Hub
</div>

<div class="layout">

<div class="sidebar">

<div class="sidebar-search">
<input id="search" placeholder="Search docs..." oninput="searchDocs()">
</div>

<div class="tree" id="menu"></div>

</div>

<div class="content">

<div class="breadcrumb" id="breadcrumb">Home</div>

<div class="doc">
<div id="content" class="markdown-body">
<h1>IT Knowledge Hub</h1>
<p>Select document.</p>
</div>
</div>

</div>

<div class="toc">
<div id="toc"></div>
</div>

</div>

<script>

const repo="blady211/wiki_site";

let indexCache=[];
let fuse;

/* fetch */

async function safeFetch(url){
try{
const r=await fetch(url);
if(!r.ok) return null;
return r;
}catch{
return null;
}
}

/* recursive repo scan */

async function indexRepo(path=""){

const url=`https://api.github.com/repos/${repo}/contents/${path}`;

const res=await safeFetch(url);
if(!res) return;

const items=await res.json();

for(const item of items){

if(item.type==="dir"){
await indexRepo(item.path);
continue;
}

if(!item.name.endsWith(".md")) continue;

const raw=item.download_url;

const textRes=await safeFetch(raw);
if(!textRes) continue;

const text=await textRes.text();

indexCache.push({
title:item.name.replace(".md",""),
path:item.path,
url:raw,
text
});

}

}

/* build sidebar */

function buildTree(){

const menu=document.getElementById("menu");
menu.innerHTML="";

indexCache.forEach(doc=>{

const btn=document.createElement("button");
btn.className="tree-file";
btn.textContent=doc.title;

btn.onclick=()=>openDoc(doc);

menu.appendChild(btn);

});

}

/* open doc */

function openDoc(doc){

document.getElementById("breadcrumb").textContent=doc.path;

document.getElementById("content").innerHTML=marked.parse(doc.text);

generateTOC();
addCopy();

}

/* toc */

function generateTOC(){

const toc=document.getElementById("toc");
toc.innerHTML="";

const headers=document.querySelectorAll("#content h2,#content h3");

headers.forEach(h=>{

const id=h.textContent.toLowerCase().replace(/\s+/g,"-");
h.id=id;

const a=document.createElement("a");
a.href="#"+id;
a.textContent=h.textContent;

toc.appendChild(a);

});

}

/* copy code */

function addCopy(){

document.querySelectorAll("pre code").forEach(block=>{

const btn=document.createElement("span");
btn.className="copy";
btn.textContent="copy";

btn.onclick=()=>{
navigator.clipboard.writeText(block.innerText);
btn.textContent="copied";
setTimeout(()=>btn.textContent="copy",1500);
};

block.parentElement.prepend(btn);

});

}

/* snippet */

function snippet(text,q){

const i=text.toLowerCase().indexOf(q.toLowerCase());

if(i<0) return text.slice(0,120);

return text.slice(Math.max(0,i-50),i+120);

}

/* search */

function searchDocs(){

const q=document.getElementById("search").value.trim();

const menu=document.getElementById("menu");

if(!q){
buildTree();
return;
}

const results=fuse.search(q);

menu.innerHTML="";

results.slice(0,25).forEach(r=>{

const div=document.createElement("div");
div.className="result";

const t=document.createElement("div");
t.className="result-title";
t.textContent=r.item.title;

const s=document.createElement("div");
s.className="result-snippet";
s.innerHTML=snippet(r.item.text,q).replaceAll(q,"<mark>"+q+"</mark>");

div.appendChild(t);
div.appendChild(s);

div.onclick=()=>openDoc(r.item);

menu.appendChild(div);

});

}

/* init */

async function init(){

await indexRepo();

fuse=new Fuse(indexCache,{
keys:["title","text"],
threshold:0.35,
ignoreLocation:true
});

buildTree();

}

init();

</script>

</body>
</html>
