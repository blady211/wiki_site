<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>IT Knowledge Hub</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown.min.css">

<style>

:root{
--bg:#0f172a;
--panel:#111827;
--sidebar:#020617;
--border:#1f2937;
--accent:#22c55e;
--text:#e5e7eb;
--muted:#94a3b8;
}

/* base */

body{
margin:0;
font-family:system-ui;
background:var(--bg);
color:var(--text);
}

.layout{
display:grid;
grid-template-columns:300px 1fr 260px;
height:100vh;
}

/* sidebar */

.sidebar{
background:var(--sidebar);
border-right:1px solid var(--border);
display:flex;
flex-direction:column;
}

.logo{
padding:18px;
font-weight:700;
border-bottom:1px solid var(--border);
}

.search{
padding:12px;
border-bottom:1px solid var(--border);
}

#search{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid var(--border);
background:#020617;
color:white;
}

.tree{
overflow:auto;
padding:12px;
}

/* folders */

.tree-folder{
font-size:12px;
text-transform:uppercase;
color:var(--muted);
margin-top:14px;
cursor:pointer;
}

.tree-sub{
margin-left:14px;
display:none;
}

.tree-sub.open{
display:block;
}

/* files */

.tree-file{
display:block;
width:100%;
text-align:left;
background:none;
border:none;
padding:6px;
cursor:pointer;
border-radius:6px;
color:#cbd5f5;
}

.tree-file:hover{
background:#1e293b;
}

.tree-file.active{
background:#16a34a;
color:white;
}

/* content */

.content{
overflow:auto;
padding:40px;
}

.markdown-body{
background:var(--panel);
padding:40px;
border-radius:14px;
max-width:900px;
margin:auto;
}

/* toc */

.toc{
border-left:1px solid var(--border);
padding:20px;
overflow:auto;
background:#020617;
}

.toc h3{
font-size:12px;
text-transform:uppercase;
color:var(--muted);
}

.toc a{
display:block;
color:var(--muted);
font-size:13px;
text-decoration:none;
padding:3px 0;
}

.toc a:hover{
color:var(--accent);
}

/* results */

.result{
padding:10px;
border-bottom:1px solid var(--border);
cursor:pointer;
}

.result-title{
font-weight:600;
}

.result-snippet{
font-size:13px;
color:var(--muted);
}

mark{
background:#16a34a;
color:white;
}

</style>

</head>

<body>

<div class="layout">

<div class="sidebar">

<div class="logo">
IT Knowledge Hub
</div>

<div class="search">
<input id="search" placeholder="Search docs..." oninput="searchDocs()">
</div>

<div id="menu" class="tree"></div>

</div>

<div class="content">

<div id="content" class="markdown-body">
<h1>Welcome</h1>
<p>Select a document from the sidebar.</p>
</div>

</div>

<div class="toc">

<h3>On this page</h3>

<div id="toc"></div>

</div>

</div>

<script>

const repo="blady211/wiki_site";

let indexCache=[];
let fuse;

/* fetch */

async function safeFetch(url){
try{
const r=await fetch(url);
if(!r.ok) return null;
return r;
}catch{
return null;
}
}

/* recursive scan */

async function indexRepo(path=""){

const url=`https://api.github.com/repos/${repo}/contents/${path}`;

const res=await safeFetch(url);
if(!res) return;

const items=await res.json();

for(const item of items){

if(item.type==="dir"){
await indexRepo(item.path);
continue;
}

if(!item.name.endsWith(".md")) continue;

const raw=item.download_url;

const textRes=await safeFetch(raw);
if(!textRes) continue;

const text=await textRes.text();

indexCache.push({
title:item.name.replace(".md",""),
path:item.path,
url:raw,
text
});

}

}

/* build tree */

function buildTree(){

const menu=document.getElementById("menu");
menu.innerHTML="";

const folders={};

indexCache.forEach(doc=>{

const parts=doc.path.split("/");

let level=folders;

for(let i=0;i<parts.length;i++){

const part=parts[i];

if(i===parts.length-1){

if(!level.files) level.files=[];

level.files.push(doc);

}else{

if(!level[part]) level[part]={};

level=level[part];

}

}

});

renderTree(folders,menu);

}

/* render tree */

function renderTree(obj,parent){

for(const key in obj){

if(key==="files"){

obj.files.forEach(doc=>{

const btn=document.createElement("button");
btn.className="tree-file";
btn.textContent=doc.title;

btn.onclick=()=>openDoc(doc);

parent.appendChild(btn);

});

continue;

}

const folder=document.createElement("div");
folder.className="tree-folder";
folder.textContent="▶ "+key;

const sub=document.createElement("div");
sub.className="tree-sub";

folder.onclick=()=>{

const open=sub.classList.toggle("open");

folder.textContent=(open?"▼ ":"▶ ")+key;

};

parent.appendChild(folder);
parent.appendChild(sub);

renderTree(obj[key],sub);

}

}

/* open doc */

function openDoc(doc){

document.getElementById("content").innerHTML=marked.parse(doc.text);

generateTOC();

}

/* toc */

function generateTOC(){

const toc=document.getElementById("toc");
toc.innerHTML="";

const headers=document.querySelectorAll("#content h2,#content h3");

headers.forEach(h=>{

const id=h.textContent.toLowerCase().replace(/\s+/g,"-");

h.id=id;

const a=document.createElement("a");

a.href="#"+id;
a.textContent=h.textContent;

toc.appendChild(a);

});

}

/* snippet */

function snippet(text,q){

const i=text.toLowerCase().indexOf(q.toLowerCase());

if(i<0) return text.slice(0,120);

return text.slice(Math.max(0,i-50),i+120);

}

/* search */

function searchDocs(){

const q=document.getElementById("search").value.trim();

const menu=document.getElementById("menu");

if(!q){
buildTree();
return;
}

const results=fuse.search(q);

menu.innerHTML="";

results.slice(0,25).forEach(r=>{

const div=document.createElement("div");
div.className="result";

const t=document.createElement("div");
t.className="result-title";
t.textContent=r.item.title;

const s=document.createElement("div");
s.className="result-snippet";

s.innerHTML=snippet(r.item.text,q).replaceAll(q,"<mark>"+q+"</mark>");

div.appendChild(t);
div.appendChild(s);

div.onclick=()=>openDoc(r.item);

menu.appendChild(div);

});

}

/* init */

async function init(){

await indexRepo();

fuse=new Fuse(indexCache,{
keys:["title","text"],
threshold:0.35,
ignoreLocation:true
});

buildTree();

}

init();

</script>

</body>
</html>
