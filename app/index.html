<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>IT Knowledge Hub</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown.min.css">

<style>

body{
margin:0;
font-family:system-ui;
background:#0f172a;
color:#e5e7eb;
}

/* layout */

.layout{
display:grid;
grid-template-columns:300px 1fr 240px;
height:100vh;
}

/* sidebar */

.sidebar{
background:#020617;
border-right:1px solid #1e293b;
display:flex;
flex-direction:column;
}

.logo{
padding:18px;
font-weight:700;
border-bottom:1px solid #1e293b;
}

.search{
padding:12px;
border-bottom:1px solid #1e293b;
}

#search{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #1e293b;
background:#020617;
color:white;
}

.tree{
overflow:auto;
padding:12px;
}

/* folders */

.tree-folder{
font-size:13px;
margin-top:10px;
cursor:pointer;
color:#94a3b8;
}

.tree-sub{
margin-left:14px;
display:none;
}

.tree-sub.open{
display:block;
}

/* files */

.tree-file{
display:block;
width:100%;
text-align:left;
background:none;
border:none;
padding:6px;
cursor:pointer;
border-radius:6px;
color:#cbd5f5;
}

.tree-file:hover{
background:#1e293b;
}

.tree-file.active{
background:#0ea5e9;
color:white;
}

/* content */

.content{
overflow:auto;
padding:40px;
}

.markdown-body{
background:#020617;
padding:40px;
border-radius:12px;
max-width:900px;
margin:auto;
}

/* toc */

.toc{
border-left:1px solid #1e293b;
padding:20px;
overflow:auto;
background:#020617;
}

.toc a{
display:block;
color:#94a3b8;
font-size:13px;
text-decoration:none;
padding:3px 0;
}

.toc a:hover{
color:#38bdf8;
}

/* search results */

.result{
padding:10px;
border-bottom:1px solid #1e293b;
cursor:pointer;
}

.result-title{
font-weight:600;
}

.result-snippet{
font-size:13px;
color:#94a3b8;
}

mark{
background:#38bdf8;
color:white;
}

</style>

</head>

<body>

<div class="layout">

<div class="sidebar">

<div class="logo">IT Knowledge Hub</div>

<div class="search">
<input id="search" placeholder="Search docs..." oninput="searchDocs()">
</div>

<div id="menu" class="tree"></div>

</div>

<div class="content">

<div id="content" class="markdown-body">
<h1>Welcome</h1>
<p>Select document from sidebar.</p>
</div>

</div>

<div class="toc">
<div id="toc"></div>
</div>

</div>

<script>

const repo="blady211/wiki_site";

let docs=[];
let fuse;

/* fetch helper */

async function getJSON(url){
const r=await fetch(url);
if(!r.ok) return [];
return r.json();
}

/* scan repo */

async function scan(path=""){

const url=`https://api.github.com/repos/${repo}/contents/${path}`;

const items=await getJSON(url);

for(const item of items){

if(item.type==="dir"){
await scan(item.path);
continue;
}

if(!item.name.endsWith(".md")) continue;

docs.push({
title:item.name.replace(".md",""),
path:item.path,
url:item.download_url
});

}

}

/* build tree */

function buildTree(){

const menu=document.getElementById("menu");

menu.innerHTML="";

docs.forEach(doc=>{

const btn=document.createElement("button");

btn.className="tree-file";

btn.textContent=doc.title;

btn.onclick=()=>openDoc(doc);

menu.appendChild(btn);

});

}

/* open markdown */

async function openDoc(doc){

const r=await fetch(doc.url);

const text=await r.text();

doc.text=text;

document.getElementById("content").innerHTML=marked.parse(text);

generateTOC();

}

/* toc */

function generateTOC(){

const toc=document.getElementById("toc");

toc.innerHTML="";

const headers=document.querySelectorAll("#content h2,#content h3");

headers.forEach(h=>{

const id=h.textContent.toLowerCase().replace(/\s+/g,"-");

h.id=id;

const a=document.createElement("a");

a.href="#"+id;

a.textContent=h.textContent;

toc.appendChild(a);

});

}

/* search */

async function searchDocs(){

const q=document.getElementById("search").value.trim();

const menu=document.getElementById("menu");

if(!q){
buildTree();
return;
}

if(!fuse){

for(const d of docs){

if(!d.text){

const r=await fetch(d.url);

d.text=await r.text();

}

}

fuse=new Fuse(docs,{
keys:["title","text"],
threshold:0.35
});

}

const results=fuse.search(q);

menu.innerHTML="";

results.slice(0,20).forEach(r=>{

const div=document.createElement("div");

div.className="result";

div.innerHTML="<div class='result-title'>"+r.item.title+"</div>";

div.onclick=()=>openDoc(r.item);

menu.appendChild(div);

});

}

/* init */

async function init(){

await scan();

buildTree();

}

init();

</script>

</body>
</html>
